# Local development & staging stack.
# Run: docker compose up -d
# Access: http://localhost:5173 (frontend), http://localhost:8000 (API)

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pixelstake
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: pixelstake
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixelstake"]
      interval: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://pixelstake:dev_password@postgres:5432/pixelstake
      REDIS_URL: redis://redis:6379
      SECRET_KEY: development-secret-key-min-32-chars-long-for-staging
      ADMIN_PASSWORD: dev-admin-password-12+
      ENVIRONMENT: staging
      CANVAS_WIDTH: "1000"
      CANVAS_HEIGHT: "1000"
      FREE_COOLDOWN_SECONDS: "30"
      SUB_COOLDOWN_SECONDS: "5"
      BATTLE_SOLO_START: "1"
      BATTLE_SOLO_END: "10"
      BATTLE_CLAN_START: "11"
      BATTLE_CLAN_END: "20"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pg_data:
  redis_data:
