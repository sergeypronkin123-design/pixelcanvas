name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pixelstake_test
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready" --health-interval 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app/

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app/ --ignore-missing-imports || true

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/pixelstake_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: test-secret-key-at-least-32-chars-long-for-tests
          ADMIN_PASSWORD: test-admin-password-12-chars
          ENVIRONMENT: development
        run: pytest -v --cov=app --cov-report=term-missing

  frontend:
    name: Frontend build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check || npx tsc --noEmit

      - name: Lint
        working-directory: frontend
        run: npm run lint || npx eslint src/ --max-warnings 0

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Bundle size check
        working-directory: frontend
        run: |
          BUNDLE_KB=$(du -k dist/assets/*.js | awk '{s+=$1} END {print s}')
          echo "Bundle size: ${BUNDLE_KB} KB"
          if [ "$BUNDLE_KB" -gt 800 ]; then
            echo "::warning::Bundle exceeds 800KB target"
          fi

  e2e:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        run: npx playwright test
        env:
          BASE_URL: http://localhost:5173
